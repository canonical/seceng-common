type: charm
name: canonical-seceng-nginx
summary: A very short one-line summary of the charm.
description: |
  A single sentence that says what the charm is, concisely and memorably.

  A paragraph of one to three short sentences, that describe what the charm does.

  A third paragraph that explains what need the charm meets.

  Finally, a paragraph that describes whom the charm is useful for.
base: ubuntu@24.04
platforms:
  amd64:


parts:
  charm:
    plugin: charm
    charm-strict-dependencies: true
    source: .
    build-packages:
      - git


charm-libs:
  - lib: traefik_k8s.ingress
    version: "2"


config:
  options:
    deployment:
      description: |
        Deployment type. Acceptable values are: "staging", and "production"
      default: "production"
      type: string
    http-config:
      description: |
        The configuration for the nginx http block (context http).
      default: ""
      type: string
    default-server-config:
      description: |
        The configuration for the nginx default server block (context
        http.server).
      default: ""
      type: string


requires:
  ingress:
    interface: ingress
    limit: 1
  server:
    interface: seceng-server
    limit: 1


provides:
  nginx:
    interface: seceng-nginx
    scope: container
