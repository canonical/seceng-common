type: charm
name: canonical-seceng-server
summary: A very short one-line summary of the charm.
description: |
  A single sentence that says what the charm is, concisely and memorably.

  A paragraph of one to three short sentences, that describe what the charm does.

  A third paragraph that explains what need the charm meets.

  Finally, a paragraph that describes whom the charm is useful for.
base: ubuntu@24.04
platforms:
  amd64:


parts:
  charm:
    plugin: charm
    charm-strict-dependencies: true
    source: .
    build-packages:
      - git


config:
  options:
    deployment:
      description: |
        Deployment type. Acceptable values are: "staging", and "production"
      default: "production"
      type: string
    proxy:
      description: |
        An HTTP proxy required for outbound connections (optional).
      type: string


provides:
  server:
    interface: seceng-server
